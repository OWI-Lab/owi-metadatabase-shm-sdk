[bumpversion]
current_version = 0.1.0
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(?:\-(?P<release>beta)\.(?P<num>\d+))?
serialize =
	{major}.{minor}.{patch}-{release}.{num}
	{major}.{minor}.{patch}
commit = False
tag = False

[bumpversion:file:./GitVersion.yml]

[bumpversion:file:./pyproject.toml]
search = name = "shm"
	version = "{current_version}"
replace = name = "shm"
	version = "{new_version}"

[bumpversion:file:./uv.lock]
search = name = "shm"
	version = "{current_version}"
replace = name = "shm"
	version = "{new_version}"

[bumpversion:file:./src/owi/metadatabase/shm/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:./tests/test_imports.py]
search = assert __version__ == "{current_version}"
replace = assert __version__ == "{new_version}"
